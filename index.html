<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Jump</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }

#hud {
  position: fixed; pointer-events: none;
  font-family: 'Orbitron', Helvetica, Arial, sans-serif; color: #fff;
  z-index: 10; overflow: hidden;
}
/* HUD の内容物はすべて基準解像度（SCREEN_W × SCREEN_H）で配置し、
   #hud-stage を画面サイズへ scale() することで文字・余白・位置を同一比率で拡縮する。
   stage のサイズと transform は JS（resize）で設定する。 */
#hud-stage {
  position: absolute; top: 0; left: 0;
  transform-origin: top left;
}
#hs {
  position: absolute; top: 12px; left: 16px;
  font-size: 20px; letter-spacing: 2px;
  text-shadow: 1px 1px 3px #000;
  transition: color 0.3s;
}
#hs.new-record {
  color: #ffdd44;
  text-shadow: 0 0 12px rgba(255,220,0,0.9), 1px 1px 3px #000;
}
#sc {
  position: absolute; top: 12px; right: 16px;
  font-size: 20px; letter-spacing: 1px;
  text-shadow: 1px 1px 3px #000;
}
#title-logo-wrap {
  position: absolute; top: 14%; left: 50%;
  transform: translateX(-50%);
  text-align: center; display: none; opacity: 0;
  transition: opacity 0.6s ease;
}
#title-logo-wrap.visible  { display: block; }
#title-logo-wrap.faded-in { opacity: 1; }
#title-logo {
  font-size: 58px; font-weight: 900; letter-spacing: 7px;
  color: #fff; font-family: 'Orbitron', 'Arial Black', sans-serif;
  text-shadow:
    0 0 18px rgba(80,160,255,1), 0 0 36px rgba(80,160,255,0.6),
    3px 3px 0 #00081a, 5px 5px 0 #00081a;
  white-space: nowrap;
}
#title-dash { color: #55ccff; }
#title-prompt {
  position: absolute; bottom: 18%; left: 50%;
  transform: translateX(-50%);
  text-align: center; display: none; opacity: 0;
  transition: opacity 0.6s ease;
}
#title-prompt.visible  { display: block; }
#title-prompt.faded-in { opacity: 1; }
#title-sub {
  font-size: 22px; letter-spacing: 4px; color: #fff;
  text-shadow: 1px 1px 6px #000; margin-bottom: 6px;
  animation: pulse 1.4s ease-in-out infinite;
}
#title-key {
  font-size: 14px; letter-spacing: 3px;
  color: rgba(200,220,255,0.7); text-shadow: 1px 1px 4px #000;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
#gameover {
  position: absolute; top: 42%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center; display: none; opacity: 0;
  transition: opacity 0.5s ease;
}
#gameover.visible  { display: block; }
#gameover.faded-in { opacity: 1; }
#go-text {
  font-size: 48px; font-weight: 900; letter-spacing: 8px;
  font-family: 'Orbitron', 'Arial Black', sans-serif; color: #ff4444;
  text-shadow: 0 0 20px rgba(255,60,60,0.8), 3px 3px 0 #200000;
}
#go-score {
  font-size: 20px; letter-spacing: 3px; color: #fff;
  text-shadow: 1px 1px 4px #000; margin-top: 10px;
}
/* 遷移キャンバスは stage の外（実ピクセル解像度）に置き、JS の hudW/hudH で描画する */
#transition-canvas {
  position: absolute; top: 0; left: 0;
  pointer-events: none; z-index: 20; opacity: 0;
}
</style>
</head>
<body>
<div id="hud">
  <div id="hud-stage">
    <div id="hs">MAX &nbsp;&nbsp;<span id="hs-val">0</span>m</div>
    <div id="sc"><span id="sc-val"></span></div>
    <div id="title-logo-wrap">
      <div id="title-logo">SPACE<span id="title-dash">&#8209;</span>JUMP</div>
    </div>
    <div id="title-prompt">
      <div id="title-sub">Push to Start!</div>
      <div id="title-key">&lt; Space / ↑ &gt;</div>
    </div>
    <div id="gameover">
      <div id="go-text">GAME OVER</div>
      <div id="go-score">Score: <span id="go-score-val">0</span>m</div>
    </div>
  </div>
  <canvas id="transition-canvas"></canvas>
</div>

<script type="importmap">

<script type="module">
import * as THREE from 'three';

/* ================================================================
 * ユーティリティ
 * ================================================================ */
const { degToRad } = THREE.MathUtils;
const easeIn2  = t => t * t;
const easeOut2 = t => 1 - (1 - t) * (1 - t);

// Canvas 2D 色ヘルパー（引数は 0–255 整数）。色定数は配列でもち、スプレッドで渡す: rgba(...WARP_RING, a)
const rgba = (r, g, b, a) => `rgba(${r},${g},${b},${a})`;

/* ================================================================
 * 定数
 *   距離   : Three.js ワールド単位
 *   速度   : /ms
 *   角度   : deg（degToRad で変換済みの場合は変数名に _RAD を付与）
 * ================================================================ */

// ── レンダラー / カメラ ──────────────────────────────────────────
const SCREEN_W    = 700;
const SCREEN_H    = 500;
const CAM_FOV     = 30;
const CAM_NEAR    = 1;
const CAM_FAR     = 50;
const CAM_POS     = new THREE.Vector3(0, 1, 20);
const CAM_LOOK_Y  = 1;
const DELTA_MAX   = 100; // [ms]

// ── ワールド ────────────────────────────────────────────────────
const WORLD_HALF = 25;

// ── 地面 ────────────────────────────────────────────────────────
const GROUND_W = 200;
const GROUND_H = 20;
const GROUND_D = 3;

// ── プレイヤー物理 ───────────────────────────────────────────────
const PLAYER_RADIUS      = 0.5;
const PLAYER_X           = -2;       // プレイ中の固定 X 位置（スパイクが流れてくる）
const GRAVITY            = 0.000075; // [/ms²]
const JUMP_SPEED         = 0.02;     // [/ms]
const ROLL_SPEED         = -0.7;     // [deg/ms]
const PLAYER_ORIENT_Y_RAD = degToRad(50);

// ── プレイヤーアニメーション ─────────────────────────────────────
const PLAYER_BOB_FREQ = 12;  // theta 乗算係数
const PLAYER_BOB_AMP  = 10;  // [deg]

// ── プレイヤー形状（すべて PLAYER_RADIUS 基準） ──────────────────
const PLAYER_HEAD_R_FACTOR  = 0.85;  // 頭半径 = PLAYER_RADIUS * factor
const PLAYER_HEAD_Y_FACTOR  = 1.3;   // 頭中心 Y  = PLAYER_RADIUS * factor
const PLAYER_EYE_R_FACTOR   = 0.22;  // 目半径
const PLAYER_ARM_X          = 0.4;
const PLAYER_ARM_R          = 0.05;
const PLAYER_ARM_H          = 0.7;
const PLAYER_ARM_TILT_RAD   = degToRad(60);
const PLAYER_NOSE_R         = 0.08;
const PLAYER_NOSE_H         = 0.4;
const PLAYER_NOSE_TILT_RAD  = degToRad(70);
const PLAYER_BTN_R          = 0.1;
const PLAYER_BTN_NUM        = 3;
const PLAYER_BTN_STEP_RAD   = degToRad(20);
const PLAYER_BTN_ARC_R      = PLAYER_RADIUS * 0.84; // ボタン配置弧の半径

// ── スパイク ─────────────────────────────────────────────────────
const SPIKE_NUM       = 4;
const SPIKE_SPEED     = 0.015;  // [/ms]
const SPIKE_RADIUS    = 1.0;
const SPIKE_ROLL_RATE = 60;     // theta 乗算係数
const SPIKE_SPINE_NUM = 12;
const SPIKE_EYE_Z     = 0.9;    // 眼の前方オフセット係数（× SPIKE_RADIUS）
const SPIKE_EYE_R     = 0.3;            // 眼の半径
const SPIKE_EYE_SCALE = [0.5, 0.5, 1.5];// 眼のスケール（前方に伸ばす）
const SPIKE_SPINE_R   = 0.5;            // トゲ（コーン）底半径
const SPIKE_SPINE_LEN = 1.0;            // トゲ（コーン）高さ
const SPIKE_Z_SQUASH  = 0.95;           // 本体の奥行きつぶし
const SPIKE_MIN_GAP   = 5;
const SPIKE_MAX_GAP   = 20;
const SPIKE_Y         = -PLAYER_RADIUS;  // 地面上固定 Y（プレイヤー底面と一致）
const SPIKE_INIT_X    = 20;             // 初期配置 X 間隔

// ── 星 ──────────────────────────────────────────────────────────
const STAR_NUM         = 50;
const STAR_RADIUS      = 0.1;
const STAR_SPEED_TITLE = 0.075; // [/ms]
const STAR_SPEED_PLAY  = 0.015; // [/ms]
const STAR_Y_MIN       = -10;
const STAR_Y_RANGE     = 35;
const STAR_Z_RANGE     = 25;

// ── ロケット ─────────────────────────────────────────────────────
const ROCKET_START_X    = -3;               // タイトル初期 / 発射開始 X
const ROCKET_ACCEL      = 0.00025;          // [/ms²]
const ROCKET_INIT_SPEED = -0.05;            // 発射初速（左向き）[/ms]
const ROCKET_WING_NUM   = 6;
const ROCKET_WARP_X     = WORLD_HALF * 0.6; // ワープ発火 X 閾値
const ROCKET_HIDE_X     = -30;              // ワープ後の退避 X
const ROCKET_TITLE_Z    = -20;
const ROCKET_TITLE_Y_OFS = 1;              // タイトル時 Y 座標オフセット
const ROCKET_TITLE_ROLL_RAD = degToRad(-90); // タイトル時の機体ロール（左向き固定）
const ROCKET_TITLE_SPIN  = 3;              // タイトル時 theta 自転係数
const ROCKET_PLAY_SPIN   = 1;              // プレイ時 theta 自転係数
const ROCKET_ORBIT_THETA = 4;             // プレイ時 Y 揺れの theta 乗算係数
const ROCKET_ORBIT_AMP   = 0.8;           // プレイ時 Y 揺れ振幅
const ROCKET_ORBIT_Z     = 10;            // 公転中心 Z
const ROCKET_ORBIT_R     = 30;            // 公転半径 Z

// ── 遷移 ─────────────────────────────────────────────────────────
const TX_WARP_OUT_MS       = 700;
const TX_WARP_IN_MS        = 350;
const TX_FADE_OUT_MS       = 800;
const TX_FADE_IN_MS        = 500;
const TX_GAMEOVER_DELAY_MS = 1200;
const TX_HUD_FADE_MS       = 600;
const TX_RING_NUM          = 5;
const TX_RING_INTERVAL_MS  = 60;

// ── 遷移ワープ描画 ───────────────────────────────────────────────
const TX_RING_MAX_R_FACTOR = 0.7;   // 画面対角に対するリング最大半径比
const TX_RING_STROKE_ALPHA = 0.8;
const TX_RING_GLOW_INNER   = 0.7;   // 光彩グラデーション内側半径比
const TX_RING_GLOW_ALPHA   = 0.25;
const TX_RING_LINE_MAX     = 12;
const TX_RING_LINE_MIN     = 2;
const TX_WARP_FLASH_START  = 0.5;   // OUT 進行度この値以降でフラッシュ開始
// 遷移描画カラー（rgba() ヘルパーへスプレッドして使用、各成分 0–255）
const WARP_RING  = [100, 200, 255]; // ワープリング
const WARP_GLOW  = [ 60, 180, 255]; // ワープ光彩
const WARP_FLASH = [200, 230, 255]; // ワープフラッシュ
const FADE_BG    = [  0,   0,  12]; // フェード背景

// ── カメラシェイク ───────────────────────────────────────────────
const SHAKE_POWER = 0.35;
const SHAKE_DECAY = 0.88;   // /frame 減衰率
const SHAKE_MIN   = 0.001;  // これ以下で停止

// ── 崩壊エフェクト ───────────────────────────────────────────────
const BURST_GRAVITY     = 0.00015;  // [/ms²]
const BURST_LIFE_MS     = 180;
const BURST_FADE_START  = 0.6;      // 寿命の何割でフェード開始
const BURST_BOUNCE_DAMP = 0.35;     // バウンス時の Y 速度減衰
const BURST_BOUNCE_FRIC = 0.7;      // バウンス時の X 速度減衰
const BURST_FLOOR_Y     = SPIKE_Y * 0.6; // 破片が止まる Y（地面より少し上）
const BURST_VX_SPREAD   = 0.048;    // [/ms] X 速度散乱幅
const BURST_VY_BASE     = 0.005;    // [/ms] Y 初速ベース
const BURST_VY_RAND     = 0.02;     // [/ms] Y 初速ランダム幅
const BURST_VY_HEIGHT   = 0.0125;   // パーツ高さ依存の上方向加算係数
const BURST_VZ_SPREAD   = 0.02;     // [/ms] Z 速度散乱幅
const BURST_SPIN_SPREAD = 0.075;    // [/ms] 回転速度散乱幅

// ── HUD ──────────────────────────────────────────────────────────
const HS_FLASH_MS    = 2000;
const TITLE_BOB_FREQ = 3;  // タイトルロゴ揺れ theta 乗算係数
const TITLE_BOB_AMP  = 4;  // [px]

// ── theta アキュムレータ ─────────────────────────────────────────
const THETA_SPEED = 0.0006; // [/ms]（≒ 0.01/frame @ 60fps）

// ── 環境 ────────────────────────────────────────────────────────
const SCENE_BG_COLOR      = new THREE.Color(0, 0, 0.3);
const LIGHT_AMBIENT_COLOR = 0x404060;
const LIGHT_AMBIENT_INT   = 0.6;
const LIGHT_KEY_COLOR     = 0xfff0e0;
const LIGHT_KEY_INT       = 1.1;
const LIGHT_KEY_POS       = [2, 3, 4];
const LIGHT_FILL_COLOR    = 0x6080ff;
const LIGHT_FILL_INT      = 0.4;
const LIGHT_FILL_POS      = [-3, -1, 2];

// ── ジオメトリ分割数 ─────────────────────────────────────────────
const SEG_HI  = 36;  // プレイヤー胴体・頭・スパイク本体
const SEG_MID = 24;  // ロケット glass ウィンドウ
const SEG_LO  = 12;  // コーン・腕・細部

// ── シーン識別子 ─────────────────────────────────────────────────
const SCENE    = Object.freeze({ TITLE: 'title', PLAY: 'play' });
const TX_STATE = Object.freeze({ IDLE: 'idle', OUT: 'out', IN: 'in' });
const TX_TYPE  = Object.freeze({ WARP: 'warp', FADE: 'fade' });

/* ── 導出定数（他の定数から算出） ─────────────────────────────── */
// ボタン配置: NUM 個を STEP 間隔で等間隔、中心 = 0
const PLAYER_BTN_HALF_SPAN = PLAYER_BTN_STEP_RAD * (PLAYER_BTN_NUM - 1) / 2;
// プレイヤー形状（PLAYER_RADIUS 倍）
const PLAYER_HEAD_R = PLAYER_RADIUS * PLAYER_HEAD_R_FACTOR;
const PLAYER_HEAD_Y = PLAYER_RADIUS * PLAYER_HEAD_Y_FACTOR;
const PLAYER_EYE_R  = PLAYER_RADIUS * PLAYER_EYE_R_FACTOR;

/* ================================================================
 * Renderer
 * ================================================================ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.domElement.style.position = 'fixed';
document.body.appendChild(renderer.domElement);

const hud      = document.getElementById('hud');
const hudStage = document.getElementById('hud-stage');
const txCanvas = document.getElementById('transition-canvas');
const txCtx    = txCanvas.getContext('2d');
let hudW = 0, hudH = 0, txRingMaxR = 0;

// HUD ステージは基準解像度に固定し、resize で scale() のみ更新する
hudStage.style.width  = `${SCREEN_W}px`;
hudStage.style.height = `${SCREEN_H}px`;

function resize() {
  const asp  = SCREEN_W / SCREEN_H;
  let w = innerWidth, h = innerHeight;
  if (w / h > asp) w = Math.floor(h * asp); else h = Math.floor(w / asp);
  const left = Math.floor((innerWidth  - w) / 2);
  const top  = Math.floor((innerHeight - h) / 2);
  renderer.setSize(w, h);
  renderer.domElement.style.left = `${left}px`;
  renderer.domElement.style.top  = `${top}px`;
  Object.assign(hud.style, { left: `${left}px`, top: `${top}px`, width: `${w}px`, height: `${h}px` });
  hudStage.style.transform = `scale(${w / SCREEN_W})`; // HUD 全体を基準解像度→画面サイズへ同一比率拡縮
  txCanvas.width = w; txCanvas.height = h;
  hudW = w; hudH = h;
  txRingMaxR = Math.hypot(w, h) * TX_RING_MAX_R_FACTOR; // resize 時にキャッシュ
}
addEventListener('resize', resize); resize();

/* ================================================================
 * Scene / Camera / Lights
 * ================================================================ */
const scene = new THREE.Scene();
scene.background = SCENE_BG_COLOR;

const cam = new THREE.PerspectiveCamera(CAM_FOV, SCREEN_W / SCREEN_H, CAM_NEAR, CAM_FAR);
cam.position.copy(CAM_POS);
cam.lookAt(0, CAM_LOOK_Y, 0);

scene.add(new THREE.AmbientLight(LIGHT_AMBIENT_COLOR, LIGHT_AMBIENT_INT));
const keyLight = new THREE.DirectionalLight(LIGHT_KEY_COLOR, LIGHT_KEY_INT);
keyLight.position.set(...LIGHT_KEY_POS); scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(LIGHT_FILL_COLOR, LIGHT_FILL_INT);
fillLight.position.set(...LIGHT_FILL_POS); scene.add(fillLight);

/* ================================================================
 * カメラシェイク
 * ================================================================ */
const shake = {
  intensity: 0,
  trigger() { this.intensity = SHAKE_POWER; },
  update() {
    if (this.intensity < SHAKE_MIN) { this.intensity = 0; cam.position.copy(CAM_POS); return; }
    cam.position.set(
      CAM_POS.x + (Math.random() - 0.5) * 2 * this.intensity,
      CAM_POS.y + (Math.random() - 0.5) * 2 * this.intensity,
      CAM_POS.z
    );
    this.intensity *= SHAKE_DECAY;
  }
};

/* ================================================================
 * マテリアル
 * stdMat の r,g,b は 0–1 の THREE.Color スケール
 * ================================================================ */
function stdMat(r, g, b, roughness = 0.6, metalness = 0.15) {
  return new THREE.MeshStandardMaterial({ color: new THREE.Color(r, g, b), roughness, metalness });
}
const MAT = {
  red       : stdMat(0.88, 0.22, 0.18, 0.50, 0.25),
  darkRed   : stdMat(0.62, 0.14, 0.12, 0.55, 0.25),
  lightBlue : stdMat(0.86, 0.89, 0.97, 0.45, 0.05),
  black     : stdMat(0.14, 0.14, 0.16, 0.60, 0.15),
  brown     : stdMat(0.34, 0.20, 0.15, 0.70, 0.05),
  silver    : stdMat(0.78, 0.80, 0.84, 0.40, 0.60),
  darkSilver: stdMat(0.62, 0.64, 0.70, 0.45, 0.55),
  ground    : stdMat(0.45, 0.46, 0.52, 0.95, 0.05),
  glass     : new THREE.MeshStandardMaterial({
    color: new THREE.Color(0.55, 0.6, 0.95), roughness: 0.15, metalness: 0.5
  }),
  star      : new THREE.MeshStandardMaterial({
    color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.7, roughness: 1, metalness: 0
  }),
};

/* ================================================================
 * ジオメトリ / メッシュ生成ヘルパー
 * cone: 底面を原点に置き、先端が +Y 方向
 * ================================================================ */
const GEO = {
  sph : (r, seg)    => new THREE.SphereGeometry(r, seg, seg),
  cyl : (r, h, seg) => new THREE.CylinderGeometry(r, r, h, seg),
  box : (x, y, z)   => new THREE.BoxGeometry(x, y, z),
  cone: (r, h, seg) => {
    const g = new THREE.ConeGeometry(r, h, seg, 3);
    g.translate(0, h / 2, 0);
    return g;
  },
};

const mkMesh = (geo, mat)       => new THREE.Mesh(geo, mat);
const mkSph  = (r, seg, mat)    => mkMesh(GEO.sph(r, seg), mat);
const mkCyl  = (r, h, seg, mat) => mkMesh(GEO.cyl(r, h, seg), mat);
const mkCone = (r, h, seg, mat) => mkMesh(GEO.cone(r, h, seg), mat);
const mkBox  = (x, y, z, mat)   => mkMesh(GEO.box(x, y, z), mat);

/* ================================================================
 * プレイヤーパーツ定義（単一ソース）
 *   builders.player() と Burst.spawn() の双方が参照する。
 *   geo : 毎回生成するファクトリ（破片は独自に dispose するため共有しない）
 *   rot : [rx, ry, rz] ラジアン（省略時は [0, 0, 0]）
 * ================================================================ */
const PLAYER_PARTS = [
  // 胴体
  { geo: () => GEO.sph(PLAYER_RADIUS, SEG_HI),   mat: MAT.lightBlue, pos: [0, 0, 0] },
  // 腕（右・左）
  { geo: () => GEO.cyl(PLAYER_ARM_R, PLAYER_ARM_H, SEG_LO), mat: MAT.brown,
    pos: [ PLAYER_ARM_X, 0.2, 0], rot: [0, 0, -PLAYER_ARM_TILT_RAD] },
  { geo: () => GEO.cyl(PLAYER_ARM_R, PLAYER_ARM_H, SEG_LO), mat: MAT.brown,
    pos: [-PLAYER_ARM_X, 0.2, 0], rot: [0, 0,  PLAYER_ARM_TILT_RAD] },
  // 頭
  { geo: () => GEO.sph(PLAYER_HEAD_R, SEG_HI), mat: MAT.lightBlue, pos: [0, PLAYER_HEAD_Y, 0] },
  // 目（右・左）
  { geo: () => GEO.sph(PLAYER_EYE_R, SEG_LO), mat: MAT.black,
    pos: [ 0.1, PLAYER_HEAD_Y + 0.1, 0.3] },
  { geo: () => GEO.sph(PLAYER_EYE_R, SEG_LO), mat: MAT.black,
    pos: [-0.1, PLAYER_HEAD_Y + 0.1, 0.3] },
  // 鼻（X 軸方向に傾いたコーン）
  { geo: () => GEO.cone(PLAYER_NOSE_R, PLAYER_NOSE_H, SEG_LO), mat: MAT.red,
    pos: [0, PLAYER_HEAD_Y - 0.1, 0.2], rot: [PLAYER_NOSE_TILT_RAD, 0, 0] },
  // ボタン（胴体前面に弧状配置）
  ...Array.from({ length: PLAYER_BTN_NUM }, (_, i) => {
    const ax = PLAYER_BTN_STEP_RAD * i - PLAYER_BTN_HALF_SPAN;
    return {
      geo: () => GEO.sph(PLAYER_BTN_R, SEG_LO),
      mat: MAT.brown,
      pos: [0, -Math.sin(ax) * PLAYER_BTN_ARC_R, Math.cos(ax) * PLAYER_BTN_ARC_R],
    };
  }),
];

/* ================================================================
 * オブジェクトビルダー
 * ================================================================ */
const builders = {
  ground() {
    const m = mkBox(GROUND_W, GROUND_H, GROUND_D, MAT.ground);
    m.position.set(0, -GROUND_H / 2 - PLAYER_RADIUS, 0);
    return m;
  },

  player() {
    const root   = new THREE.Group();
    const orient = new THREE.Group();
    orient.rotation.y = PLAYER_ORIENT_Y_RAD;

    for (const { geo, mat, pos, rot = [0, 0, 0] } of PLAYER_PARTS) {
      const m = mkMesh(geo(), mat);
      m.position.set(...pos);
      m.rotation.set(...rot);
      orient.add(m);
    }

    root.add(orient);
    root.userData.orient = orient; // ボブアニメ用参照
    return root;
  },

  spike() {
    const root = new THREE.Group();
    root.scale.set(1, 1, SPIKE_Z_SQUASH);
    root.add(mkSph(SPIKE_RADIUS, SEG_HI, MAT.black));

    const eye = mkSph(SPIKE_EYE_R, SEG_LO, MAT.silver);
    eye.position.set(0, 0, SPIKE_RADIUS * SPIKE_EYE_Z);
    eye.scale.set(...SPIKE_EYE_SCALE);
    root.add(eye);

    for (let i = 0; i < SPIKE_SPINE_NUM; i++) {
      const zGrp = new THREE.Group();
      zGrp.rotation.z = degToRad(360 / SPIKE_SPINE_NUM * i);
      const cone = mkCone(SPIKE_SPINE_R, SPIKE_SPINE_LEN, SEG_LO, MAT.silver);
      cone.position.y = SPIKE_SPINE_LEN / 2;
      zGrp.add(cone); root.add(zGrp);
    }
    return root;
  },

  star() {
    return mkSph(STAR_RADIUS, SEG_LO, MAT.star);
  },

  rocket() {
    const pose = new THREE.Group();
    const spin = new THREE.Group();
    const body = new THREE.Group();
    body.scale.set(2, 3, 2);

    const tip    = mkCone(1.0, 2.0, SEG_LO, MAT.red);       tip.position.y    =  2;    body.add(tip);
    const upCyl  = mkCyl(1.0, 2.0, SEG_LO, MAT.silver);     upCyl.position.y  =  1;    body.add(upCyl);
    const dnCyl  = mkCyl(1.0, 2.0, SEG_LO, MAT.darkSilver); dnCyl.position.y  = -1;    body.add(dnCyl);
    const nozzle = mkCone(0.5, 1.0, SEG_LO, MAT.black);     nozzle.position.y = -2.5;  body.add(nozzle);

    for (let i = 0; i < ROCKET_WING_NUM; i++) {
      const wg = new THREE.Group(); wg.rotation.y = degToRad(-60 * i);
      const wc = mkCone(0.5, 1.0, SEG_LO, MAT.darkRed);
      wc.position.set(1, -2, 0); wc.scale.set(1.5, 2.0, 0.5);
      wg.add(wc); body.add(wg);
    }

    const glass = mkSph(1.0, SEG_MID, MAT.glass);
    glass.position.set(0, 1, 0.85); glass.scale.set(0.5, 0.34, 0.45);
    body.add(glass);

    spin.add(body); pose.add(spin);
    pose.userData.spin = spin;
    return pose;
  },
};

/* ================================================================
 * シーン内オブジェクト生成
 * ================================================================ */
const groundMesh = builders.ground(); scene.add(groundMesh);
const playerMesh = builders.player(); scene.add(playerMesh);
const rocketMesh = builders.rocket(); scene.add(rocketMesh);

// 毎フレーム参照するサブグループはローカルにキャッシュ（userData の文字列アクセスを回避）
const playerOrient = playerMesh.userData.orient;
const rocketSpin   = rocketMesh.userData.spin;

const spikes = Array.from({ length: SPIKE_NUM }, () => {
  const mesh = builders.spike(); scene.add(mesh);
  mesh.position.set(999, SPIKE_Y, 0);
  mesh.visible = false;
  return mesh;
});

const starMeshes = Array.from({ length: STAR_NUM }, () => {
  const m = builders.star(); scene.add(m); return m;
});

/* ================================================================
 * ゲーム状態
 * ================================================================ */
let theta      = 0;
let gameScene  = SCENE.TITLE;
let score      = 0;
let highScore  = 0;
let isGameOver = false;

const player = { x: 0, y: 0, vy: 0, roll: 0, jumping: false };
const rocket = { x: 0, y: 0, speed: 0, moving: false, launched: false };

/* ================================================================
 * 初期化
 * ================================================================ */
function randomizeStarYZ(m) {
  m.position.y = STAR_Y_MIN + Math.random() * STAR_Y_RANGE;
  m.position.z = -Math.random() * STAR_Z_RANGE;
}

function placeStars() {
  for (const m of starMeshes) {
    m.position.x = Math.random() * WORLD_HALF * 2 - WORLD_HALF;
    randomizeStarYZ(m);
  }
}

function resetRocket() { rocket.x = ROCKET_START_X; rocket.y = 0; rocket.speed = 0; rocket.moving = false; rocket.launched = false; }
function resetPlayer() { player.x = PLAYER_X; player.y = 0; player.vy = 0; player.roll = 0; player.jumping = false; }
function resetSpikes() { spikes.forEach((m, i) => { m.position.x = SPIKE_INIT_X * (i + 2); }); }

function init() {
  highScore = 0;
  placeStars();
  switchScene(SCENE.TITLE);
}

/* ================================================================
 * 遷移システム (TX)
 * ================================================================ */
const TX = {
  state:     TX_STATE.IDLE,
  t:         0,
  duration:  1,
  nextScene: SCENE.TITLE,
  type:      TX_TYPE.FADE,
  rings:     [],

  get isTransitioning() { return this.state !== TX_STATE.IDLE; },

  startOut(nextScene, type = TX_TYPE.FADE) {
    this.state     = TX_STATE.OUT;
    this.t         = 0;
    this.nextScene = nextScene;
    this.type      = type;
    this.duration  = (type === TX_TYPE.WARP) ? TX_WARP_OUT_MS : TX_FADE_OUT_MS;
    if (type === TX_TYPE.WARP) this._spawnRings();
  },

  _spawnRings() {
    this.rings = Array.from({ length: TX_RING_NUM }, (_, i) => ({
      delay: i * TX_RING_INTERVAL_MS, r: 0, alpha: 1
    }));
  },

  update(ms) {
    if (this.state === TX_STATE.IDLE) return;
    this.t = Math.min(this.t + ms / this.duration, 1);
    if (this.state === TX_STATE.OUT && this.t >= 1) {
      switchScene(this.nextScene);
      this.state    = TX_STATE.IN;
      this.t        = 0;
      this.duration = (this.type === TX_TYPE.WARP) ? TX_WARP_IN_MS : TX_FADE_IN_MS;
    } else if (this.state === TX_STATE.IN && this.t >= 1) {
      this.state = TX_STATE.IDLE;
      this.t     = 0;
    }
  },

  // ── 描画サブルーチン ─────────────────────────────────────────

  _drawWarpOut() {
    const elapsed = this.t * this.duration;
    const cx = hudW / 2, cy = hudH / 2;
    for (const ring of this.rings) {
      const rt = Math.max(0, elapsed - ring.delay) / (this.duration - ring.delay);
      if (rt <= 0) continue;
      const p = easeOut2(Math.min(rt, 1));
      ring.r = txRingMaxR * p; ring.alpha = 1 - p;
      txCtx.beginPath();
      txCtx.arc(cx, cy, ring.r, 0, Math.PI * 2);
      txCtx.strokeStyle = rgba(...WARP_RING, ring.alpha * TX_RING_STROKE_ALPHA);
      txCtx.lineWidth   = (1 - p) * TX_RING_LINE_MAX + TX_RING_LINE_MIN;
      txCtx.stroke();
      const grd = txCtx.createRadialGradient(cx, cy, ring.r * TX_RING_GLOW_INNER, cx, cy, ring.r);
      grd.addColorStop(0, rgba(...WARP_GLOW, 0));
      grd.addColorStop(1, rgba(...WARP_GLOW, ring.alpha * TX_RING_GLOW_ALPHA));
      txCtx.fillStyle = grd; txCtx.fill();
    }
    const flash = easeIn2(Math.max(0, (this.t - TX_WARP_FLASH_START) / (1 - TX_WARP_FLASH_START)));
    if (flash > 0) {
      txCtx.fillStyle = rgba(...WARP_FLASH, flash);
      txCtx.fillRect(0, 0, hudW, hudH);
    }
  },

  draw() {
    txCtx.clearRect(0, 0, hudW, hudH);
    if (this.state === TX_STATE.IDLE) { txCanvas.style.opacity = '0'; return; }
    txCanvas.style.opacity = '1';

    if (this.state === TX_STATE.OUT) {
      if (this.type === TX_TYPE.WARP) {
        this._drawWarpOut();
      } else {
        txCtx.fillStyle = rgba(...FADE_BG, easeIn2(this.t));
        txCtx.fillRect(0, 0, hudW, hudH);
      }
    } else { // IN
      const alpha = 1 - easeOut2(this.t);
      txCtx.fillStyle = (this.type === TX_TYPE.WARP)
        ? rgba(...WARP_FLASH, alpha)
        : rgba(...FADE_BG, alpha);
      txCtx.fillRect(0, 0, hudW, hudH);
    }
  },
};

function switchScene(next) {
  gameScene = next; score = 0; isGameOver = false;
  resetPlayer();
  resetSpikes();
  if (next === SCENE.TITLE) { resetRocket(); Burst.clear(); }
}

/* ================================================================
 * 更新 — プレイヤー
 * ================================================================ */
function updatePlayer(ms) {
  player.vy -= GRAVITY * ms;
  if (player.jumping) { player.y += player.vy * ms; player.roll += ROLL_SPEED * ms; }
  if (player.y <= 0)  { player.y = 0; player.vy = 0; player.jumping = false; player.roll = 0; }

  playerMesh.position.set(player.x, player.y, 0);
  playerMesh.rotation.z = degToRad(player.roll);
  // orient グループでアイドルボブ（ジャンプ中は 0）
  playerOrient.rotation.z = player.jumping
    ? 0
    : degToRad(Math.sin(theta * PLAYER_BOB_FREQ) * PLAYER_BOB_AMP - PLAYER_BOB_AMP / 2);
}

/* ================================================================
 * 更新 — スパイク
 * ================================================================ */
function rightmostSpikeX(excludeIdx) {
  let max = -Infinity;
  for (let i = 0; i < SPIKE_NUM; i++) {
    if (i !== excludeIdx) max = Math.max(max, spikes[i].position.x);
  }
  return max === -Infinity ? WORLD_HALF : max;
}

function updateSpikes(ms) {
  for (let i = 0; i < SPIKE_NUM; i++) {
    const m = spikes[i];
    m.position.x -= SPIKE_SPEED * ms;

    if (!isGameOver) {
      const dx = m.position.x - player.x, dy = SPIKE_Y - player.y;
      if (dx * dx + dy * dy < (SPIKE_RADIUS + PLAYER_RADIUS) ** 2) {
        isGameOver = true;
        shake.trigger();
        Burst.spawn(player.x, player.y);
        setTimeout(() => TX.startOut(SCENE.TITLE), TX_GAMEOVER_DELAY_MS);
      }
    }

    if (m.position.x < -WORLD_HALF) {
      m.position.x = rightmostSpikeX(i) + SPIKE_MIN_GAP + Math.random() * (SPIKE_MAX_GAP - SPIKE_MIN_GAP);
    }
    m.rotation.z = theta * SPIKE_ROLL_RATE;
  }
}

/* ================================================================
 * 更新 — 星
 * ================================================================ */
function updateStars(ms) {
  const spd = (gameScene === SCENE.PLAY ? STAR_SPEED_PLAY : STAR_SPEED_TITLE) * ms;
  for (const m of starMeshes) {
    m.position.x -= spd;
    if (m.position.x < -WORLD_HALF) {
      m.position.x = WORLD_HALF + Math.random() * WORLD_HALF;
      randomizeStarYZ(m);
    }
  }
}

/* ================================================================
 * 更新 — ロケット
 *   プレイ時の公転: C1·Rx(θ)·C2
 *   C1 = Tz(ORBIT_Z), C2 = Rz(π)·Tz(ORBIT_R)（事前計算済み定数行列）
 *   毎フレームは _orbitRotX のみ更新する。
 * ================================================================ */
const _orbitC1 = new THREE.Matrix4().makeTranslation(0, 0, ROCKET_ORBIT_Z);
const _orbitC2 = new THREE.Matrix4()
  .makeRotationZ(Math.PI)
  .multiply(new THREE.Matrix4().makeTranslation(0, 0, ROCKET_ORBIT_R));
const _orbitMat  = new THREE.Matrix4();
const _orbitRotX = new THREE.Matrix4();
const _orbitScale = new THREE.Vector3(); // decompose 用一時オブジェクト（毎回 new しない）

function updateRocket(ms) {
  if (gameScene === SCENE.TITLE) {
    rocketSpin.rotation.y = theta * ROCKET_TITLE_SPIN;
    rocket.y = Math.sin(theta * ROCKET_ORBIT_THETA) * ROCKET_ORBIT_AMP;
    if (rocket.moving) {
      rocket.speed += ROCKET_ACCEL * ms;
      rocket.x     += rocket.speed * ms;
      if (rocket.x > ROCKET_WARP_X && !TX.isTransitioning) {
        TX.startOut(SCENE.PLAY, TX_TYPE.WARP);
        rocket.moving = false; rocket.launched = false;
        rocket.x = ROCKET_HIDE_X; rocket.speed = 0;
      }
    }
    rocketMesh.position.set(rocket.x, rocket.y + ROCKET_TITLE_Y_OFS, ROCKET_TITLE_Z);
    rocketMesh.rotation.set(0, 0, ROCKET_TITLE_ROLL_RAD);
  } else {
    rocketSpin.rotation.y = theta * ROCKET_PLAY_SPIN;
    _orbitMat.copy(_orbitC1)
      .multiply(_orbitRotX.makeRotationX(theta * ROCKET_PLAY_SPIN))
      .multiply(_orbitC2);
    _orbitMat.decompose(rocketMesh.position, rocketMesh.quaternion, _orbitScale);
  }
}

/* ================================================================
 * 崩壊エフェクト (Burst)
 *   PLAYER_PARTS の各パーツを orient ローカル座標からワールド座標へ変換して飛散。
 *   orient の Y 軸回転（PLAYER_ORIENT_Y_RAD）のみ適用する。
 * ================================================================ */
const _orientEuler = new THREE.Euler(0, PLAYER_ORIENT_Y_RAD, 0);

const Burst = {
  particles: [],

  spawn(wx, wy) {
    const localPos = new THREE.Vector3();
    for (const { geo, mat, pos } of PLAYER_PARTS) {
      const m = mkMesh(geo(), mat.clone());
      m.material.transparent = true; m.material.opacity = 1;
      scene.add(m);

      localPos.set(...pos).applyEuler(_orientEuler);
      m.position.set(wx + localPos.x, wy + localPos.y, localPos.z);

      this.particles.push({
        mesh: m,
        vx: (Math.random() - 0.5) * BURST_VX_SPREAD,
        vy: BURST_VY_BASE + Math.random() * BURST_VY_RAND + (pos[1] / (PLAYER_RADIUS * 2)) * BURST_VY_HEIGHT,
        vz: (Math.random() - 0.5) * BURST_VZ_SPREAD,
        rx: (Math.random() - 0.5) * BURST_SPIN_SPREAD,
        ry: (Math.random() - 0.5) * BURST_SPIN_SPREAD,
        rz: (Math.random() - 0.5) * BURST_SPIN_SPREAD,
        life: 0,
      });
    }
  },

  update(ms) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life += ms;
      if (p.life >= BURST_LIFE_MS) { this._remove(i); continue; }

      p.vy -= BURST_GRAVITY * ms;
      p.mesh.position.x += p.vx * ms;
      p.mesh.position.y += p.vy * ms;
      p.mesh.position.z += p.vz * ms;
      if (p.mesh.position.y < BURST_FLOOR_Y) {
        p.mesh.position.y = BURST_FLOOR_Y;
        p.vy *= -BURST_BOUNCE_DAMP;
        p.vx *=  BURST_BOUNCE_FRIC;
      }
      p.mesh.rotation.x += p.rx * ms;
      p.mesh.rotation.y += p.ry * ms;
      p.mesh.rotation.z += p.rz * ms;

      const fade = 1 - Math.max(0,
        (p.life - BURST_LIFE_MS * BURST_FADE_START) / (BURST_LIFE_MS * (1 - BURST_FADE_START))
      );
      p.mesh.material.opacity = fade;
    }
  },

  _remove(i) {
    const p = this.particles[i];
    scene.remove(p.mesh);
    p.mesh.geometry.dispose();
    p.mesh.material.dispose();
    this.particles.splice(i, 1);
  },

  clear() {
    for (let i = this.particles.length - 1; i >= 0; i--) this._remove(i);
  },
};

/* ================================================================
 * HUD
 * ================================================================ */
const elHsVal       = document.getElementById('hs-val');
const elScVal       = document.getElementById('sc-val');
const elHs          = document.getElementById('hs');
const elTitleLogo   = document.getElementById('title-logo-wrap');
const elTitlePrompt = document.getElementById('title-prompt');
const elTitleLogoTx = document.getElementById('title-logo');
const elGameover    = document.getElementById('gameover');
const elGoScore     = document.getElementById('go-score-val');

// lastHS: 初回（0点）でのフラッシュを防ぐために前フレーム値を保持
const hudState = { lastHS: 0, titleShown: false, goShown: false };

function setFadeEl(el, show) {
  const cur = el.classList.contains('visible');
  if (show === cur) return;
  if (show) {
    el.classList.add('visible');
    requestAnimationFrame(() => el.classList.add('faded-in'));
  } else {
    el.classList.remove('faded-in');
    setTimeout(() => el.classList.remove('visible'), TX_HUD_FADE_MS);
  }
}

function updateHUD() {
  elHsVal.textContent = highScore;
  // lastHS > 0 チェック: 初回プレイ終了時のフラッシュを抑制
  if (highScore > hudState.lastHS && hudState.lastHS > 0) {
    elHs.classList.add('new-record');
    setTimeout(() => elHs.classList.remove('new-record'), HS_FLASH_MS);
  }
  hudState.lastHS = highScore;

  elScVal.textContent = (gameScene === SCENE.PLAY && !TX.isTransitioning)
    ? `${Math.floor(score)}m` : '';

  const showTitle = gameScene === SCENE.TITLE && !TX.isTransitioning;
  if (showTitle !== hudState.titleShown) {
    hudState.titleShown = showTitle;
    setFadeEl(elTitleLogo,   showTitle);
    setFadeEl(elTitlePrompt, showTitle);
  }
  if (showTitle) elTitleLogoTx.style.transform = `translateY(${Math.sin(theta * TITLE_BOB_FREQ) * TITLE_BOB_AMP}px)`;

  const showGO = isGameOver && gameScene === SCENE.PLAY && !TX.isTransitioning;
  if (showGO !== hudState.goShown) {
    hudState.goShown = showGO;
    if (showGO) elGoScore.textContent = Math.floor(score);
    setFadeEl(elGameover, showGO);
  }
}

/* ================================================================
 * 入力
 * ================================================================ */
function jump() {
  if (!player.jumping && gameScene === SCENE.PLAY && !TX.isTransitioning) {
    player.jumping = true; player.vy = JUMP_SPEED; player.y += player.vy;
  }
}

function onInput() {
  if (gameScene === SCENE.TITLE && !TX.isTransitioning && !rocket.launched) {
    rocket.launched = true; rocket.moving = true; rocket.speed = ROCKET_INIT_SPEED;
  }
  jump();
}

addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); onInput(); }
});
renderer.domElement.addEventListener('click', onInput);
renderer.domElement.addEventListener('touchstart', e => { e.preventDefault(); onInput(); }, { passive: false });

/* ================================================================
 * メインループ
 * ================================================================ */
let lastTime = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const ms = Math.min(now - lastTime, DELTA_MAX);
  lastTime = now;

  theta += THETA_SPEED * ms;
  TX.update(ms);

  updateStars(ms);
  updateRocket(ms);
  Burst.update(ms);

  const inGame = gameScene === SCENE.PLAY;
  const active = inGame && !TX.isTransitioning && !isGameOver; // スコア加算・スパイク進行の条件

  groundMesh.visible = inGame;
  playerMesh.visible = inGame && !isGameOver;
  spikes.forEach(m => { m.visible = inGame && !TX.isTransitioning; });

  if (active) {
    score += SPIKE_SPEED * ms;
    updateSpikes(ms);
  }
  if (inGame) updatePlayer(ms); // 遷移中・ゲームオーバー中も落下/着地を継続
  if (inGame && isGameOver) highScore = Math.max(highScore, Math.floor(score));

  updateHUD();
  shake.update();
  renderer.render(scene, cam);
  TX.draw();
}

/* ================================================================
 * 起動
 * ================================================================ */
init();
lastTime = performance.now();
requestAnimationFrame(animate);
</script>
</body>
</html>
