<style>
:root { --hud-fade: 600ms; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }

#hud {
  position: fixed; pointer-events: none;
  font-family: 'Orbitron', Helvetica, Arial, sans-serif; color: #fff;
  z-index: 10; overflow: hidden;
}
#hud-stage {
  position: absolute; top: 0; left: 0;
  transform-origin: top left;
}
#hs {
  position: absolute; top: 12px; left: 16px;
  font-size: 20px; letter-spacing: 2px;
  text-shadow: 1px 1px 3px #000;
  transition: color 0.3s;
}
#hs.new-record {
  color: #ffdd44;
  text-shadow: 0 0 12px rgba(255,220,0,0.9), 1px 1px 3px #000;
}
#sc {
  position: absolute; top: 12px; right: 16px;
  font-size: 20px; letter-spacing: 1px;
  text-shadow: 1px 1px 3px #000;
}
.fade {
  text-align: center; display: none; opacity: 0;
  transition: opacity var(--hud-fade) ease;
}
.fade.visible  { display: block; }
.fade.faded-in { opacity: 1; }
#title-logo-wrap {
  position: absolute; top: 8%; left: 50%;
  transform: translateX(-50%);
}
#title-logo {
  font-size: 58px; font-weight: 900; letter-spacing: 7px;
  color: #fff; font-family: 'Orbitron', 'Arial Black', sans-serif;
  text-shadow:
    0 0 18px rgba(80,160,255,1), 0 0 36px rgba(80,160,255,0.6),
    3px 3px 0 #00081a, 5px 5px 0 #00081a;
  white-space: nowrap;
}
#title-dash { color: #55ccff; }
#title-prompt {
  position: absolute; bottom: 7%; left: 50%;
  transform: translateX(-50%);
}
#title-sub {
  font-size: 22px; letter-spacing: 4px; color: #fff;
  text-shadow: 1px 1px 6px #000; margin-bottom: 6px;
  animation: pulse 1.4s ease-in-out infinite;
}
#title-key {
  font-size: 14px; letter-spacing: 3px;
  color: rgba(200,220,255,0.7); text-shadow: 1px 1px 4px #000;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
#gameover {
  position: absolute; top: 42%; left: 50%;
  transform: translate(-50%, -50%);
}
#go-text {
  font-size: 48px; font-weight: 900; letter-spacing: 8px;
  font-family: 'Orbitron', 'Arial Black', sans-serif; color: #ff4444;
  text-shadow: 0 0 20px rgba(255,60,60,0.8), 3px 3px 0 #200000;
}
#go-score {
  font-size: 20px; letter-spacing: 3px; color: #fff;
  text-shadow: 1px 1px 4px #000; margin-top: 10px;
}
#transition-canvas {
  position: absolute; top: 0; left: 0;
  pointer-events: none; z-index: 20; opacity: 0;
}
</style>
</head>

<script type="module">
import * as THREE from 'three';

const { degToRad } = THREE.MathUtils;
const easeIn2 = t => t * t;
const easeOut2 = t => 1 - (1 - t) * (1 - t);
const clamp01 = t => t < 0 ? 0 : t > 1 ? 1 : t;
const rand = (min, max) => min + Math.random() * (max - min);
const randSym = spread => (Math.random() - 0.5) * spread;
const TAU = Math.PI * 2;

const rgba = (r, g, b, a) => `rgba(${r},${g},${b},${a})`;

const SCREEN_W = 700;
const SCREEN_H = 420;
const SCREEN_H_FULL = 500;
const CAM_FOV = 30;
const CAM_NEAR = 1;
const CAM_FAR = 50;
const CAM_POS = new THREE.Vector3(0, 1, 20);
const CAM_LOOK_Y = 1;
const DELTA_MAX = 100;

const WORLD_HALF = 25;

const GROUND_W = 200;
const GROUND_H = 20;
const GROUND_D = 3;

const PLAYER_RADIUS = 0.5;
const PLAYER_X = -2;
const GRAVITY = 0.000075;
const JUMP_SPEED = 0.02;
const ROLL_SPEED = -0.7;
const PLAYER_ORIENT_Y_RAD = degToRad(50);

const PLAYER_BOB_FREQ = 12;
const PLAYER_BOB_AMP = 10;

const PLAYER_HEAD_R_FACTOR = 0.85;
const PLAYER_HEAD_Y_FACTOR = 1.3;
const PLAYER_EYE_R_FACTOR = 0.22;
const PLAYER_ARM_X = 0.4;
const PLAYER_ARM_Y = 0.2;
const PLAYER_ARM_R = 0.05;
const PLAYER_ARM_H = 0.7;
const PLAYER_ARM_TILT_RAD = degToRad(60);
const PLAYER_EYE_X = 0.1;
const PLAYER_EYE_Y_OFS = 0.1;
const PLAYER_EYE_Z = 0.3;
const PLAYER_NOSE_R = 0.08;
const PLAYER_NOSE_H = 0.4;
const PLAYER_NOSE_TILT_RAD = degToRad(70);
const PLAYER_NOSE_Y_OFS = -0.1;
const PLAYER_NOSE_Z = 0.2;
const PLAYER_BTN_R = 0.1;
const PLAYER_BTN_NUM = 3;
const PLAYER_BTN_STEP_RAD = degToRad(20);
const PLAYER_BTN_ARC_FACTOR = 0.84;
const PLAYER_BTN_ARC_R = PLAYER_RADIUS * PLAYER_BTN_ARC_FACTOR;

const SPIKE_NUM = 4;
const SPIKE_SPEED = 0.015;
const SPIKE_RADIUS = 1.0;
const SPIKE_ROLL_RATE = 60;
const SPIKE_SPINE_NUM = 12;
const SPIKE_EYE_Z_FACTOR = 0.9;
const SPIKE_EYE_R = 0.3;
const SPIKE_EYE_SCALE = [0.5, 0.5, 1.5];
const SPIKE_SPINE_R = 0.5;
const SPIKE_SPINE_LEN = 1.0;
const SPIKE_Z_SQUASH = 0.95;
const SPIKE_MIN_GAP = 5;
const SPIKE_MAX_GAP = 20;
const SPIKE_Y = -PLAYER_RADIUS;
const SPIKE_INIT_X = 20;
const SPIKE_INIT_OFS = 2;

const STAR_NUM = 50;
const STAR_RADIUS = 0.1;
const STAR_SPEED_TITLE = 0.075;
const STAR_SPEED_PLAY = 0.015;
const STAR_Y_MIN = -10;
const STAR_Y_RANGE = 35;
const STAR_Y_MAX = STAR_Y_MIN + STAR_Y_RANGE;
const STAR_Z_RANGE = 25;
const STAR_RESPAWN_X_MIN = WORLD_HALF;
const STAR_RESPAWN_X_MAX = WORLD_HALF * 2;

const ROCKET_START_X = -3;
const ROCKET_ACCEL = 0.00025;
const ROCKET_INIT_SPEED = -0.05;
const ROCKET_BODY_SCALE = [2, 3, 2];
const ROCKET_WING_NUM = 6;
const ROCKET_WARP_X = WORLD_HALF * 0.6;
const ROCKET_HIDE_X = -30;
const ROCKET_TITLE_Z = -20;
const ROCKET_TITLE_Y_OFS = 1.8;
const ROCKET_TITLE_ROLL_RAD = degToRad(-90);
const ROCKET_TITLE_SPIN = 3;
const ROCKET_TITLE_BOB_FREQ = 5;
const ROCKET_TITLE_BOB_AMP = 0.8;
const ROCKET_PLAY_SPIN = 1;
const ROCKET_ORBIT_Z = 10;
const ROCKET_ORBIT_R = 30;
const ROCKET_BASE_R = 1.0;
const ROCKET_BASE_H = 2.0;
const ROCKET_WING_SCALE = [1.5, 2.0, 0.5];
const ROCKET_GLASS_Z = 0.85;
const ROCKET_GLASS_SCALE = [0.5, 0.34, 0.45];

const TX_WARP_OUT_MS = 700;
const TX_WARP_IN_MS = 350;
const TX_FADE_OUT_MS = 800;
const TX_FADE_IN_MS = 500;
const TX_GAMEOVER_DELAY_MS = 1200;
const TX_HUD_FADE_MS = 600;
const TX_RING_NUM = 5;
const TX_RING_INTERVAL_MS = 60;

const TX_RING_MAX_R_FACTOR = 0.7;
const TX_RING_STROKE_ALPHA = 0.8;
const TX_RING_GLOW_INNER = 0.7;
const TX_RING_GLOW_ALPHA = 0.25;
const TX_RING_LINE_MAX = 12;
const TX_RING_LINE_MIN = 2;
const TX_WARP_FLASH_START = 0.5;
const WARP_RING = [100, 200, 255];
const WARP_GLOW = [60, 180, 255];
const WARP_FLASH = [200, 230, 255];
const FADE_BG = [0, 0, 12];

const SHAKE_POWER = 0.35;
const SHAKE_DECAY = 0.88;
const SHAKE_MIN = 0.001;
const SHAKE_AMP_FACTOR = 2;

const BURST_GRAVITY = 0.00015;
const BURST_LIFE_MS = 180;
const BURST_FADE_START = 0.6;
const BURST_BOUNCE_DAMP = 0.35;
const BURST_BOUNCE_FRIC = 0.7;
const BURST_FLOOR_FACTOR = 0.6;
const BURST_FLOOR_Y = SPIKE_Y * BURST_FLOOR_FACTOR;
const BURST_VX_SPREAD = 0.048;
const BURST_VY_BASE = 0.005;
const BURST_VY_RAND = 0.02;
const BURST_VY_HEIGHT = 0.0125;
const BURST_VZ_SPREAD = 0.02;
const BURST_SPIN_SPREAD = 0.075;
const BURST_HEIGHT_REF = PLAYER_RADIUS * 2;

const HS_FLASH_MS = 2000;
const TITLE_BOB_FREQ = 3;
const TITLE_BOB_AMP = 4;

const THETA_SPEED = 0.0006;

const SCENE_BG_COLOR = new THREE.Color(0, 0, 0.3);
const LIGHT_AMBIENT_COLOR = 0x404060;
const LIGHT_AMBIENT_INT = 0.6;
const LIGHT_KEY_COLOR = 0xfff0e0;
const LIGHT_KEY_INT = 1.1;
const LIGHT_KEY_POS = [2, 3, 4];
const LIGHT_FILL_COLOR = 0x6080ff;
const LIGHT_FILL_INT = 0.4;
const LIGHT_FILL_POS = [-3, -1, 2];

const SEG_HI = 36;
const SEG_MID = 24;
const SEG_LO = 12;
const CONE_HEIGHT_SEG = 3;

const SCENE = Object.freeze({ TITLE: 'title', PLAY: 'play' });
const TX_STATE = Object.freeze({ IDLE: 'idle', OUT: 'out', IN: 'in' });
const TX_TYPE = Object.freeze({ WARP: 'warp', FADE: 'fade' });

const PLAYER_BTN_HALF_SPAN = PLAYER_BTN_STEP_RAD * (PLAYER_BTN_NUM - 1) / 2;
const PLAYER_HEAD_R = PLAYER_RADIUS * PLAYER_HEAD_R_FACTOR;
const PLAYER_HEAD_Y = PLAYER_RADIUS * PLAYER_HEAD_Y_FACTOR;
const PLAYER_EYE_R = PLAYER_RADIUS * PLAYER_EYE_R_FACTOR;
const COLLISION_DIST_SQ = (SPIKE_RADIUS + PLAYER_RADIUS) ** 2;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.domElement.style.position = 'fixed';
document.body.appendChild(renderer.domElement);

const hud = document.getElementById('hud');
const hudStage = document.getElementById('hud-stage');
const txCanvas = document.getElementById('transition-canvas');
const txCtx = txCanvas.getContext('2d');
let hudW = 0;
let hudH = 0;
let txRingMaxR = 0;

hudStage.style.width = `${SCREEN_W}px`;
hudStage.style.height = `${SCREEN_H}px`;
document.documentElement.style.setProperty('--hud-fade', `${TX_HUD_FADE_MS}ms`);

function resize() {
  const asp = SCREEN_W / SCREEN_H;
  let w = innerWidth;
  let h = innerHeight;
  if (w / h > asp) {
    w = Math.floor(h * asp);
  } else {
    h = Math.floor(w / asp);
  }
  const left = Math.floor((innerWidth - w) / 2);
  const top = Math.floor((innerHeight - h) / 2);
  renderer.setSize(w, h);
  renderer.domElement.style.left = `${left}px`;
  renderer.domElement.style.top = `${top}px`;
  Object.assign(hud.style, { left: `${left}px`, top: `${top}px`, width: `${w}px`, height: `${h}px` });
  hudStage.style.transform = `scale(${w / SCREEN_W})`;
  txCanvas.width = w;
  txCanvas.height = h;
  hudW = w;
  hudH = h;
  txRingMaxR = Math.hypot(w, h) * TX_RING_MAX_R_FACTOR;
}
addEventListener('resize', resize);
resize();

const scene = new THREE.Scene();
scene.background = SCENE_BG_COLOR;

const cam = new THREE.PerspectiveCamera(CAM_FOV, SCREEN_W / SCREEN_H_FULL, CAM_NEAR, CAM_FAR);
cam.position.copy(CAM_POS);
cam.lookAt(0, CAM_LOOK_Y, 0);
cam.setViewOffset(SCREEN_W, SCREEN_H_FULL, 0, 0, SCREEN_W, SCREEN_H);

scene.add(new THREE.AmbientLight(LIGHT_AMBIENT_COLOR, LIGHT_AMBIENT_INT));
const keyLight = new THREE.DirectionalLight(LIGHT_KEY_COLOR, LIGHT_KEY_INT);
keyLight.position.set(...LIGHT_KEY_POS);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(LIGHT_FILL_COLOR, LIGHT_FILL_INT);
fillLight.position.set(...LIGHT_FILL_POS);
scene.add(fillLight);

const shake = {
  intensity: 0,
  trigger() {
    this.intensity = SHAKE_POWER;
  },
  update() {
    if (this.intensity < SHAKE_MIN) {
      this.intensity = 0;
      cam.position.copy(CAM_POS);
      return;
    }
    const amp = SHAKE_AMP_FACTOR * this.intensity;
    cam.position.set(
      CAM_POS.x + randSym(amp),
      CAM_POS.y + randSym(amp),
      CAM_POS.z
    );
    this.intensity *= SHAKE_DECAY;
  }
};

function stdMat(r, g, b, roughness = 0.6, metalness = 0.15) {
  return new THREE.MeshStandardMaterial({ color: new THREE.Color(r, g, b), roughness, metalness });
}
const MAT = {
  red: stdMat(0.88, 0.22, 0.18, 0.50, 0.25),
  darkRed: stdMat(0.62, 0.14, 0.12, 0.55, 0.25),
  lightBlue: stdMat(0.86, 0.89, 0.97, 0.45, 0.05),
  black: stdMat(0.14, 0.14, 0.16, 0.60, 0.15),
  brown: stdMat(0.34, 0.20, 0.15, 0.70, 0.05),
  silver: stdMat(0.78, 0.80, 0.84, 0.40, 0.60),
  darkSilver: stdMat(0.62, 0.64, 0.70, 0.45, 0.55),
  ground: stdMat(0.45, 0.46, 0.52, 0.95, 0.05),
  glass: stdMat(0.55, 0.60, 0.95, 0.15, 0.50),
  star: new THREE.MeshStandardMaterial({
    color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.7, roughness: 1, metalness: 0
  }),
};

const GEO = {
  sph: (r, seg) => new THREE.SphereGeometry(r, seg, seg),
  cyl: (r, h, seg) => new THREE.CylinderGeometry(r, r, h, seg),
  box: (x, y, z) => new THREE.BoxGeometry(x, y, z),
  cone: (r, h, seg) => {
    const g = new THREE.ConeGeometry(r, h, seg, CONE_HEIGHT_SEG);
    g.translate(0, h / 2, 0);
    return g;
  },
};

const mkMesh = (geo, mat) => new THREE.Mesh(geo, mat);

const ZERO_ROT = [0, 0, 0];

function partToMesh({ geo, mat, pos, rot = ZERO_ROT }) {
  const m = mkMesh(geo(), mat);
  m.position.set(...pos);
  m.rotation.set(...rot);
  return m;
}

function buildParts(parts, target = new THREE.Group()) {
  for (const part of parts) {
    target.add(partToMesh(part));
  }
  return target;
}

function radialSlots(n, axis, makeChild) {
  const group = new THREE.Group();
  for (let i = 0; i < n; i++) {
    const slot = new THREE.Group();
    slot.rotation[axis] = TAU * i / n;
    slot.add(makeChild(i));
    group.add(slot);
  }
  return group;
}

const PLAYER_PARTS = [
  { geo: () => GEO.sph(PLAYER_RADIUS, SEG_HI), mat: MAT.lightBlue, pos: [0, 0, 0] },
  { geo: () => GEO.cyl(PLAYER_ARM_R, PLAYER_ARM_H, SEG_LO), mat: MAT.brown,
    pos: [PLAYER_ARM_X, PLAYER_ARM_Y, 0], rot: [0, 0, -PLAYER_ARM_TILT_RAD] },
  { geo: () => GEO.cyl(PLAYER_ARM_R, PLAYER_ARM_H, SEG_LO), mat: MAT.brown,
    pos: [-PLAYER_ARM_X, PLAYER_ARM_Y, 0], rot: [0, 0, PLAYER_ARM_TILT_RAD] },
  { geo: () => GEO.sph(PLAYER_HEAD_R, SEG_HI), mat: MAT.lightBlue, pos: [0, PLAYER_HEAD_Y, 0] },
  { geo: () => GEO.sph(PLAYER_EYE_R, SEG_LO), mat: MAT.black,
    pos: [PLAYER_EYE_X, PLAYER_HEAD_Y + PLAYER_EYE_Y_OFS, PLAYER_EYE_Z] },
  { geo: () => GEO.sph(PLAYER_EYE_R, SEG_LO), mat: MAT.black,
    pos: [-PLAYER_EYE_X, PLAYER_HEAD_Y + PLAYER_EYE_Y_OFS, PLAYER_EYE_Z] },
  { geo: () => GEO.cone(PLAYER_NOSE_R, PLAYER_NOSE_H, SEG_LO), mat: MAT.red,
    pos: [0, PLAYER_HEAD_Y + PLAYER_NOSE_Y_OFS, PLAYER_NOSE_Z], rot: [PLAYER_NOSE_TILT_RAD, 0, 0] },
  ...Array.from({ length: PLAYER_BTN_NUM }, (_, i) => {
    const ax = PLAYER_BTN_STEP_RAD * i - PLAYER_BTN_HALF_SPAN;
    return {
      geo: () => GEO.sph(PLAYER_BTN_R, SEG_LO),
      mat: MAT.brown,
      pos: [0, -Math.sin(ax) * PLAYER_BTN_ARC_R, Math.cos(ax) * PLAYER_BTN_ARC_R],
    };
  }),
];

const STAR_GEO = GEO.sph(STAR_RADIUS, SEG_LO);
const SPIKE_BODY_GEO = GEO.sph(SPIKE_RADIUS, SEG_HI);
const SPIKE_EYE_GEO = GEO.sph(SPIKE_EYE_R, SEG_LO);
const SPIKE_SPINE_GEO = GEO.cone(SPIKE_SPINE_R, SPIKE_SPINE_LEN, SEG_LO);

const builders = {
  ground() {
    const m = mkMesh(GEO.box(GROUND_W, GROUND_H, GROUND_D), MAT.ground);
    m.position.set(0, -GROUND_H / 2 - PLAYER_RADIUS, 0);
    return m;
  },

  player() {
    const root = new THREE.Group();
    const orient = new THREE.Group();
    orient.rotation.y = PLAYER_ORIENT_Y_RAD;
    buildParts(PLAYER_PARTS, orient);
    root.add(orient);
    root.userData.orient = orient;
    return root;
  },

  spike() {
    const root = new THREE.Group();
    root.scale.set(1, 1, SPIKE_Z_SQUASH);
    root.add(mkMesh(SPIKE_BODY_GEO, MAT.black));

    const eye = mkMesh(SPIKE_EYE_GEO, MAT.silver);
    eye.position.set(0, 0, SPIKE_RADIUS * SPIKE_EYE_Z_FACTOR);
    eye.scale.set(...SPIKE_EYE_SCALE);
    root.add(eye);

    root.add(radialSlots(SPIKE_SPINE_NUM, 'z', () => {
      const cone = mkMesh(SPIKE_SPINE_GEO, MAT.silver);
      cone.position.y = SPIKE_SPINE_LEN / 2;
      return cone;
    }));
    return root;
  },

  star() {
    return mkMesh(STAR_GEO, MAT.star);
  },

  rocket() {
    const RAD = ROCKET_BASE_R;
    const H = ROCKET_BASE_H;
    const pose = new THREE.Group();
    const spin = new THREE.Group();
    const body = new THREE.Group();
    body.scale.set(...ROCKET_BODY_SCALE);

    const tip = mkMesh(GEO.cone(RAD, H, SEG_LO), MAT.red);
    tip.position.y = H;
    body.add(tip);
    const upCyl = mkMesh(GEO.cyl(RAD, H, SEG_LO), MAT.silver);
    upCyl.position.y = H / 2;
    body.add(upCyl);
    const dnCyl = mkMesh(GEO.cyl(RAD, H, SEG_LO), MAT.darkSilver);
    dnCyl.position.y = -H / 2;
    body.add(dnCyl);
    const nozzle = mkMesh(GEO.cone(RAD / 2, H / 2, SEG_LO), MAT.black);
    nozzle.position.y = -(H + RAD / 2);
    body.add(nozzle);

    body.add(radialSlots(ROCKET_WING_NUM, 'y', () => {
      const wc = mkMesh(GEO.cone(RAD / 2, H / 2, SEG_LO), MAT.darkRed);
      wc.position.set(RAD, -H, 0);
      wc.scale.set(...ROCKET_WING_SCALE);
      return wc;
    }));

    const glass = mkMesh(GEO.sph(RAD, SEG_MID), MAT.glass);
    glass.position.set(0, H / 2, ROCKET_GLASS_Z);
    glass.scale.set(...ROCKET_GLASS_SCALE);
    body.add(glass);

    spin.add(body);
    pose.add(spin);
    pose.userData.spin = spin;
    return pose;
  },
};

const groundMesh = builders.ground();
scene.add(groundMesh);
const playerMesh = builders.player();
scene.add(playerMesh);
const rocketMesh = builders.rocket();
scene.add(rocketMesh);

const playerOrient = playerMesh.userData.orient;
const rocketSpin = rocketMesh.userData.spin;

const spikes = Array.from({ length: SPIKE_NUM }, () => {
  const mesh = builders.spike();
  scene.add(mesh);
  mesh.position.y = SPIKE_Y;
  mesh.visible = false;
  return mesh;
});

const starMeshes = Array.from({ length: STAR_NUM }, () => {
  const m = builders.star();
  scene.add(m);
  return m;
});

let theta = 0;
let gameScene = SCENE.TITLE;
let score = 0;
let highScore = 0;
let isGameOver = false;

const player = { x: 0, y: 0, vy: 0, roll: 0, jumping: false };
const rocket = { x: 0, y: 0, speed: 0, moving: false };

function randomizeStarYZ(m) {
  m.position.y = rand(STAR_Y_MIN, STAR_Y_MAX);
  m.position.z = -rand(0, STAR_Z_RANGE);
}

function placeStars() {
  for (const m of starMeshes) {
    m.position.x = rand(-WORLD_HALF, WORLD_HALF);
    randomizeStarYZ(m);
  }
}

function init() {
  placeStars();
  switchScene(SCENE.TITLE);
}

const TX = {
  state: TX_STATE.IDLE,
  t: 0,
  duration: 1,
  nextScene: SCENE.TITLE,
  type: TX_TYPE.FADE,
  _wasIdle: true,

  get isTransitioning() {
    return this.state !== TX_STATE.IDLE;
  },

  startOut(nextScene, type = TX_TYPE.FADE) {
    this.state = TX_STATE.OUT;
    this.t = 0;
    this.nextScene = nextScene;
    this.type = type;
    this.duration = (type === TX_TYPE.WARP) ? TX_WARP_OUT_MS : TX_FADE_OUT_MS;
  },

  update(ms) {
    if (this.state === TX_STATE.IDLE) {
      return;
    }
    this.t = Math.min(this.t + ms / this.duration, 1);
    if (this.state === TX_STATE.OUT && this.t >= 1) {
      switchScene(this.nextScene);
      this.state = TX_STATE.IN;
      this.t = 0;
      this.duration = (this.type === TX_TYPE.WARP) ? TX_WARP_IN_MS : TX_FADE_IN_MS;
    } else if (this.state === TX_STATE.IN && this.t >= 1) {
      this.state = TX_STATE.IDLE;
      this.t = 0;
    }
  },

  _drawWarpOut() {
    const elapsed = this.t * this.duration;
    const cx = hudW / 2;
    const cy = hudH / 2;
    for (let i = 0; i < TX_RING_NUM; i++) {
      const delay = i * TX_RING_INTERVAL_MS;
      const rt = Math.max(0, elapsed - delay) / (this.duration - delay);
      if (rt <= 0) {
        continue;
      }
      const p = easeOut2(Math.min(rt, 1));
      const r = txRingMaxR * p;
      const alpha = 1 - p;
      txCtx.beginPath();
      txCtx.arc(cx, cy, r, 0, TAU);
      txCtx.strokeStyle = rgba(...WARP_RING, alpha * TX_RING_STROKE_ALPHA);
      txCtx.lineWidth = (1 - p) * TX_RING_LINE_MAX + TX_RING_LINE_MIN;
      txCtx.stroke();
      const grd = txCtx.createRadialGradient(cx, cy, r * TX_RING_GLOW_INNER, cx, cy, r);
      grd.addColorStop(0, rgba(...WARP_GLOW, 0));
      grd.addColorStop(1, rgba(...WARP_GLOW, alpha * TX_RING_GLOW_ALPHA));
      txCtx.fillStyle = grd;
      txCtx.fill();
    }
    const flash = easeIn2(Math.max(0, (this.t - TX_WARP_FLASH_START) / (1 - TX_WARP_FLASH_START)));
    if (flash > 0) {
      txCtx.fillStyle = rgba(...WARP_FLASH, flash);
      txCtx.fillRect(0, 0, hudW, hudH);
    }
  },

  draw() {
    if (this.state === TX_STATE.IDLE) {
      if (this._wasIdle) {
        return;
      }
      txCtx.clearRect(0, 0, hudW, hudH);
      txCanvas.style.opacity = '0';
      this._wasIdle = true;
      return;
    }
    this._wasIdle = false;
    txCtx.clearRect(0, 0, hudW, hudH);
    txCanvas.style.opacity = '1';

    if (this.state === TX_STATE.OUT) {
      if (this.type === TX_TYPE.WARP) {
        this._drawWarpOut();
      } else {
        txCtx.fillStyle = rgba(...FADE_BG, easeIn2(this.t));
        txCtx.fillRect(0, 0, hudW, hudH);
      }
    } else {
      const alpha = 1 - easeOut2(this.t);
      txCtx.fillStyle = (this.type === TX_TYPE.WARP)
        ? rgba(...WARP_FLASH, alpha)
        : rgba(...FADE_BG, alpha);
      txCtx.fillRect(0, 0, hudW, hudH);
    }
  },
};

function switchScene(next) {
  gameScene = next;
  score = 0;
  isGameOver = false;

  player.x = PLAYER_X;
  player.y = 0;
  player.vy = 0;
  player.roll = 0;
  player.jumping = false;
  spikes.forEach((m, i) => {
    m.position.x = SPIKE_INIT_X * (i + SPIKE_INIT_OFS);
  });

  if (next === SCENE.TITLE) {
    rocket.x = ROCKET_START_X;
    rocket.y = 0;
    rocket.speed = 0;
    rocket.moving = false;
    Burst.clear();
  }
}

function updatePlayer(ms) {
  player.vy -= GRAVITY * ms;
  if (player.jumping) {
    player.y += player.vy * ms;
    player.roll += ROLL_SPEED * ms;
  }
  if (player.y <= 0) {
    player.y = 0;
    player.vy = 0;
    player.jumping = false;
    player.roll = 0;
  }

  playerMesh.position.set(player.x, player.y, 0);
  playerMesh.rotation.z = degToRad(player.roll);
  playerOrient.rotation.z = player.jumping
    ? 0
    : degToRad(Math.sin(theta * PLAYER_BOB_FREQ) * PLAYER_BOB_AMP - PLAYER_BOB_AMP / 2);
}

function rightmostSpikeX(excludeIdx) {
  let max = -Infinity;
  for (let i = 0; i < SPIKE_NUM; i++) {
    if (i !== excludeIdx) {
      max = Math.max(max, spikes[i].position.x);
    }
  }
  return max === -Infinity ? WORLD_HALF : max;
}

function updateSpikes(ms) {
  for (let i = 0; i < SPIKE_NUM; i++) {
    const m = spikes[i];
    m.position.x -= SPIKE_SPEED * ms;

    if (!isGameOver) {
      const dx = m.position.x - player.x;
      const dy = SPIKE_Y - player.y;
      if (dx * dx + dy * dy < COLLISION_DIST_SQ) {
        isGameOver = true;
        highScore = Math.max(highScore, Math.floor(score));
        shake.trigger();
        Burst.spawn(player.x, player.y);
        setTimeout(() => TX.startOut(SCENE.TITLE), TX_GAMEOVER_DELAY_MS);
      }
    }

    if (m.position.x < -WORLD_HALF) {
      m.position.x = rightmostSpikeX(i) + rand(SPIKE_MIN_GAP, SPIKE_MAX_GAP);
    }
    m.rotation.z = theta * SPIKE_ROLL_RATE;
  }
}

function updateStars(ms) {
  const spd = (gameScene === SCENE.PLAY ? STAR_SPEED_PLAY : STAR_SPEED_TITLE) * ms;
  for (const m of starMeshes) {
    m.position.x -= spd;
    if (m.position.x < -WORLD_HALF) {
      m.position.x = rand(STAR_RESPAWN_X_MIN, STAR_RESPAWN_X_MAX);
      randomizeStarYZ(m);
    }
  }
}

const _orbitC1 = new THREE.Matrix4().makeTranslation(0, 0, ROCKET_ORBIT_Z);
const _orbitC2 = new THREE.Matrix4()
  .makeRotationZ(Math.PI)
  .multiply(new THREE.Matrix4().makeTranslation(0, 0, ROCKET_ORBIT_R));
const _orbitMat = new THREE.Matrix4();
const _orbitRotX = new THREE.Matrix4();
const _orbitScale = new THREE.Vector3();

function updateRocketTitle(ms) {
  rocketSpin.rotation.y = theta * ROCKET_TITLE_SPIN;
  rocket.y = Math.sin(theta * ROCKET_TITLE_BOB_FREQ) * ROCKET_TITLE_BOB_AMP;
  if (rocket.moving) {
    rocket.speed += ROCKET_ACCEL * ms;
    rocket.x += rocket.speed * ms;
    if (rocket.x > ROCKET_WARP_X && !TX.isTransitioning) {
      TX.startOut(SCENE.PLAY, TX_TYPE.WARP);
      rocket.moving = false;
      rocket.x = ROCKET_HIDE_X;
      rocket.speed = 0;
    }
  }
  rocketMesh.position.set(rocket.x, rocket.y + ROCKET_TITLE_Y_OFS, ROCKET_TITLE_Z);
  rocketMesh.rotation.set(0, 0, ROCKET_TITLE_ROLL_RAD);
}

function updateRocketPlay() {
  const spinAngle = theta * ROCKET_PLAY_SPIN;
  rocketSpin.rotation.y = spinAngle;
  _orbitMat.copy(_orbitC1)
    .multiply(_orbitRotX.makeRotationX(spinAngle))
    .multiply(_orbitC2);
  _orbitMat.decompose(rocketMesh.position, rocketMesh.quaternion, _orbitScale);
}

function updateRocket(ms) {
  if (gameScene === SCENE.TITLE) {
    updateRocketTitle(ms);
  } else {
    updateRocketPlay();
  }
}

const _orientEuler = new THREE.Euler(0, PLAYER_ORIENT_Y_RAD, 0);

const Burst = {
  particles: [],

  spawn(wx, wy) {
    const localPos = new THREE.Vector3();
    for (const part of PLAYER_PARTS) {
      const { pos } = part;
      const m = partToMesh({ ...part, mat: part.mat.clone() });
      m.material.transparent = true;
      m.material.opacity = 1;
      scene.add(m);

      localPos.set(...pos).applyEuler(_orientEuler);
      m.position.set(wx + localPos.x, wy + localPos.y, localPos.z);

      this.particles.push({
        mesh: m,
        vx: randSym(BURST_VX_SPREAD),
        vy: BURST_VY_BASE + Math.random() * BURST_VY_RAND + (pos[1] / BURST_HEIGHT_REF) * BURST_VY_HEIGHT,
        vz: randSym(BURST_VZ_SPREAD),
        rx: randSym(BURST_SPIN_SPREAD),
        ry: randSym(BURST_SPIN_SPREAD),
        rz: randSym(BURST_SPIN_SPREAD),
        life: 0,
      });
    }
  },

  update(ms) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life += ms;
      if (p.life >= BURST_LIFE_MS) {
        this._remove(i);
        continue;
      }

      p.vy -= BURST_GRAVITY * ms;
      p.mesh.position.x += p.vx * ms;
      p.mesh.position.y += p.vy * ms;
      p.mesh.position.z += p.vz * ms;
      if (p.mesh.position.y < BURST_FLOOR_Y) {
        p.mesh.position.y = BURST_FLOOR_Y;
        p.vy *= -BURST_BOUNCE_DAMP;
        p.vx *= BURST_BOUNCE_FRIC;
      }
      p.mesh.rotation.x += p.rx * ms;
      p.mesh.rotation.y += p.ry * ms;
      p.mesh.rotation.z += p.rz * ms;

      p.mesh.material.opacity = 1 - clamp01(
        (p.life - BURST_LIFE_MS * BURST_FADE_START) / (BURST_LIFE_MS * (1 - BURST_FADE_START))
      );
    }
  },

  _remove(i) {
    const p = this.particles[i];
    scene.remove(p.mesh);
    p.mesh.geometry.dispose();
    p.mesh.material.dispose();
    this.particles.splice(i, 1);
  },

  clear() {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this._remove(i);
    }
  },
};

const elHsVal = document.getElementById('hs-val');
const elScVal = document.getElementById('sc-val');
const elHs = document.getElementById('hs');
const elTitleLogo = document.getElementById('title-logo-wrap');
const elTitlePrompt = document.getElementById('title-prompt');
const elTitleLogoTx = document.getElementById('title-logo');
const elGameover = document.getElementById('gameover');
const elGoScore = document.getElementById('go-score-val');

const hudState = { lastHS: 0, lastScore: '', titleShown: false, goShown: false };

function setFadeEl(el, show) {
  const cur = el.classList.contains('visible');
  if (show === cur) {
    return;
  }
  if (show) {
    el.classList.add('visible');
    requestAnimationFrame(() => el.classList.add('faded-in'));
  } else {
    el.classList.remove('faded-in');
    setTimeout(() => el.classList.remove('visible'), TX_HUD_FADE_MS);
  }
}

const titleFadeEls = [elTitleLogo, elTitlePrompt];

function updateHUD() {
  if (highScore !== hudState.lastHS) {
    elHsVal.textContent = highScore;
    if (highScore > hudState.lastHS && hudState.lastHS > 0) {
      elHs.classList.add('new-record');
      setTimeout(() => elHs.classList.remove('new-record'), HS_FLASH_MS);
    }
    hudState.lastHS = highScore;
  }

  const scoreText = (gameScene === SCENE.PLAY && !TX.isTransitioning) ? `${Math.floor(score)}m` : '';
  if (scoreText !== hudState.lastScore) {
    elScVal.textContent = scoreText;
    hudState.lastScore = scoreText;
  }

  const showTitle = gameScene === SCENE.TITLE && !TX.isTransitioning;
  if (showTitle !== hudState.titleShown) {
    hudState.titleShown = showTitle;
    for (const el of titleFadeEls) {
      setFadeEl(el, showTitle);
    }
  }
  if (showTitle) {
    elTitleLogoTx.style.transform = `translateY(${Math.sin(theta * TITLE_BOB_FREQ) * TITLE_BOB_AMP}px)`;
  }

  const showGO = isGameOver && gameScene === SCENE.PLAY && !TX.isTransitioning;
  if (showGO !== hudState.goShown) {
    hudState.goShown = showGO;
    if (showGO) {
      elGoScore.textContent = Math.floor(score);
    }
    setFadeEl(elGameover, showGO);
  }
}

function jump() {
  if (!player.jumping && gameScene === SCENE.PLAY && !TX.isTransitioning) {
    player.jumping = true;
    player.vy = JUMP_SPEED;
    player.y += player.vy;
  }
}

function onInput() {
  if (gameScene === SCENE.TITLE && !TX.isTransitioning && !rocket.moving) {
    rocket.moving = true;
    rocket.speed = ROCKET_INIT_SPEED;
  }
  jump();
}

addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    onInput();
  }
});
renderer.domElement.addEventListener('click', onInput);
renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  onInput();
}, { passive: false });

let lastTime = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const ms = Math.min(now - lastTime, DELTA_MAX);
  lastTime = now;

  theta += THETA_SPEED * ms;
  TX.update(ms);

  updateStars(ms);
  updateRocket(ms);
  Burst.update(ms);

  const inGame = gameScene === SCENE.PLAY;
  const active = inGame && !TX.isTransitioning && !isGameOver;

  groundMesh.visible = inGame;
  playerMesh.visible = inGame && !isGameOver;
  for (const m of spikes) {
    m.visible = inGame && !TX.isTransitioning;
  }

  if (active) {
    score += SPIKE_SPEED * ms;
    updateSpikes(ms);
  }
  if (inGame) {
    updatePlayer(ms);
  }

  updateHUD();
  shake.update();
  renderer.render(scene, cam);
  TX.draw();
}

init();
lastTime = performance.now();
requestAnimationFrame(animate);
</script>
